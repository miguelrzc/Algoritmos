<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="ipt_n1" placeholder="Sua nota 1:"> <br>
    <input type="text" id="ipt_n2"placeholder="Sua nota 2:"> <br>    
    <input type="text" id="ipt_n3"placeholder="Sua nota 3:"> <br>

    <button onclick="Desempenho()">Analisar Desempenho</button>

    <div id="mensagem"></div>
</body>
</html>

<script>
function Desempenho() {
let n1 = Number(ipt_n1.value) 
let n2 = Number(ipt_n2.value)
let n3 = Number(ipt_n3.value)
let média = (n1+n2+n3) / 3

mensagem.innerHTML = `Sua média foi de ${média} <br>`;

if (média > 9.4) { 
mensagem.innerHTML += `Parabéns, você é fora de série!`; } 





}





</script>
